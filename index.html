<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dental Bot</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

#chat-box {
    width: 350px;
    height: 500px;
    background: white;
    border-radius: 10px;
    margin: 50px auto;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.message {
    margin: 5px 0;
}

.user {
    text-align: right;
    color: blue;
}

.bot {
    text-align: left;
    color: green;
}

#input-area {
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-top: 1px solid #ddd;
}

button {
    padding: 10px;
    border: none;
    background: purple;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="chat-box">
    <div id="messages"></div>

    <div id="input-area">
        <input type="text" id="msg" placeholder="اكتب رسالتك...">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
function addMessage(text, sender) {
    let div = document.createElement("div");
    div.classList.add("message", sender);
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
}

function sendMessage() {
    let input = document.getElementById("msg");
    let message = input.value;

    if (!message) return;

    addMessage(message, "user");

    fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.reply, "bot");
    });

    input.value = "";
}
</script>

</body>
</html>
