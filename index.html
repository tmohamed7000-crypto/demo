<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Demo Chat</title>

<style>
body {
    background: #0b0b0b;
    color: white;
    font-family: Arial;
    text-align: center;
    padding-top: 100px;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 12px 20px;
    margin-left: 10px;
    border: none;
    border-radius: 6px;
    background: #00c853;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<h1>🤖 جرب البوت الخاص بك</h1>
<p>ادخل الكود الخاص بك:</p>

<input id="code" placeholder="اكتب الكود هنا">
<button onclick="loadBot()">تشغيل</button>

<script>
function loadBot() {
    let code = document.getElementById("code").value.trim();

    // 🔥 هنا بتضيف العملاء
    let bots = {
        "demo1": "https://embed.tawk.to/69f39f472041fc1c2d2c697d/1jnfqcbqi",
        "demo2": "https://embed.tawk.to/PUT-YOUR-SECOND-ID-HERE"
    };

    if (bots[code]) {
        let s = document.createElement("script");
        s.src = bots[code];
        s.async = true;
        document.body.appendChild(s);
    } else {
        alert("❌ الكود غير صحيح");
    }
}
</script>

</body>
</html>
