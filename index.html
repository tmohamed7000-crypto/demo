<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoReply Pro | نظام الرد التلقائي</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', Tahoma;
    background:#0f172a;
    color:#e2e8f0;
}

/* الهيدر */
.hero {
    text-align:center;
    padding:80px 20px;
}

.hero h1 {
    font-size:36px;
    margin-bottom:10px;
}

.hero p {
    color:#94a3b8;
    font-size:18px;
}

.main-btn {
    margin-top:25px;
    padding:14px 28px;
    background:#22c55e;
    color:white;
    text-decoration:none;
    border-radius:8px;
    display:inline-block;
    font-size:18px;
}

/* القسم */
.section {
    padding:60px 20px;
    text-align:center;
}

/* الأزرار */
.features {
    max-width:600px;
    margin:30px auto;
}

.btn-feature {
    display:block;
    width:100%;
    margin:12px 0;
    padding:15px;
    background:#1e293b;
    border:1px solid #334155;
    color:#e2e8f0;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn-feature:hover {
    background:#334155;
}

/* تجربة */
.demo {
    margin-top:40px;
    font-size:18px;
    color:#cbd5f5;
}

/* الفوتر */
.footer {
    text-align:center;
    padding:30px;
    color:#64748b;
    font-size:14px;
}
</style>

</head>

<body>

<div class="hero">
    <h1>AutoReply Pro</h1>
    <p>نظام رد تلقائي ذكي يساعدك على زيادة العملاء والحجوزات</p>

    <a class="main-btn" href="https://wa.me/201105039228" target="_blank">
        تواصل عبر واتساب
    </a>
</div>

<div class="section">
    <h2>المميزات</h2>

    <div class="features">
        <button class="btn-feature">استجابة تلقائية على مدار 24 ساعة</button>
        <button class="btn-feature">تحويل مباشر إلى واتساب</button>
        <button class="btn-feature">زيادة معدل التحويل والمبيعات</button>
        <button class="btn-feature">إعداد سريع خلال دقائق</button>
    </div>

    <div class="demo">
        جرّب البوت الآن — نافذة المحادثة بالأسفل
    </div>
</div>

<div class="footer">
    © AutoReply Pro — جميع الحقوق محفوظة
</div>

<!-- تشغيل البوت من الرابط -->
<script>
function getParam(name) {
    const url = new URL(window.location.href);
    return url.searchParams.get(name);
}

let bot = getParam("bot");

if (bot) {
    let s = document.createElement("script");
    s.src = "https://embed.tawk.to/" + bot;
    s.async = true;
    document.body.appendChild(s);
}
</script>

</body>
</html>
